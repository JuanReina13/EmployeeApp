<!DOCTYPE html>
<html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <link href="css/empStyle.css" rel="stylesheet">
    <title> Formulario Empleado</title>
</head>

<body>
    <h1> EMPLOYEE APP</h1>
    <h2> Hola, por favor ingrese los datos del usuario </h2>
    <form action="save" method="post">
        <table cellspacing="3" cellpadding="3" border="1">
            <tr>
                <td align="right"> ID Empleado: </td>
                <td><input type="text" name="id"></td>
            </tr>
            <tr>
                <td align="right"> Nombre Empleado: </td>
                <td> <input type="text" name="name"> </td>
            </tr>
            <tr>
                <td align="right"> Email empleado: </td>
                <td> <input type="text" name="email"> </td>
            </tr>
            <tr>
                <td align="right"> Telefono empleado: </td>
                <td> <input type="text" name="phone"> </td>
            </tr>
        </table>
        <input type="submit" value="Enviar">
    </form>

    <hr>
    <h2>Otras operaciones</h2>
    <ul>
        <li><a href="search">Buscar empleado</a></li>
        <li><a href="delete">Eliminar empleado</a></li>
        <li><a href="showAllEmployees">Mostrar todos los empleados</a></li>
    </ul>
</body>

</html>
